services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    container_name: cart
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

  delivery:
    build:
      context: ./delivery/delivery
      dockerfile: Dockerfile
    container_name: delivery
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

  gateway:
    build:
      context: ./gateway/gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # R2DBC (reactive runtime connection)
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:5432/ecommerce
      - SPRING_R2DBC_USERNAME=admin
      - SPRING_R2DBC_PASSWORD=adminpassword
      # Flyway (JDBC migration connection)
      - SPRING_FLYWAY_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_FLYWAY_USER=admin
      - SPRING_FLYWAY_PASSWORD=adminpassword
      # JWT
      - JWT_SECRET=${JWT_SECRET:-my-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-hs256}
      # Downstream service URLs (Docker internal network)
      - PRODUCTS_SERVICE_URL=http://products:8080
      - INVENTORY_SERVICE_URL=http://inventory:8080
      - CART_SERVICE_URL=http://cart:8080
      - ORDER_SERVICE_URL=http://order:8080
      - PAYMENT_SERVICE_URL=http://payment:8080
      - DELIVERY_SERVICE_URL=http://delivery:8080

  inventory:
    build:
      context: ./inventory/inventory
      dockerfile: Dockerfile
    container_name: inventory
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

  order:
    build:
      context: ./order/order
      dockerfile: Dockerfile
    container_name: order
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

  payment:
    build:
      context: ./payment/payment
      dockerfile: Dockerfile
    container_name: payment
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

  products:
    build:
      context: ./products/products
      dockerfile: Dockerfile
    container_name: products
    ports:
      - "8086:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/ecommerce
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword

volumes:
  postgres_data:
