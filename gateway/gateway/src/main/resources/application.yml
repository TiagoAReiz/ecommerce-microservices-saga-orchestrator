server:
  port: 8080

spring:
  application:
    name: gateway-service

  # R2DBC PostgreSQL for Saga State Persistence
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/ecommerce}
    username: ${SPRING_R2DBC_USERNAME:admin}
    password: ${SPRING_R2DBC_PASSWORD:adminpassword}

  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/ecommerce}
    user: ${SPRING_FLYWAY_USER:admin}
    password: ${SPRING_FLYWAY_PASSWORD:adminpassword}

  cloud:
    gateway:
      routes:
        - id: products-service
          uri: ${PRODUCTS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/products/**

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/inventory/**

        - id: cart-service
          uri: ${CART_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/carts/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/payments/**

        - id: delivery-service
          uri: ${DELIVERY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/deliveries/**

      default-filters:
        - name: Cors
          args:
            allowedOrigins: "*"
            allowedMethods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
            allowedHeaders: "*"

# Microservice base URLs for WebClient orchestration calls
app:
  services:
    products-url: ${PRODUCTS_SERVICE_URL:http://localhost:8086}
    inventory-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
    cart-url: ${CART_SERVICE_URL:http://localhost:8081}
    order-url: ${ORDER_SERVICE_URL:http://localhost:8084}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
    delivery-url: ${DELIVERY_SERVICE_URL:http://localhost:8082}
  webclient:
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
  jwt:
    secret: ${JWT_SECRET:my-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-hs256}
    public-paths:
      - /api/v1/products/**
      - /actuator/**
  saga:
    recovery:
      stuck-threshold-minutes: 5
      cron: "0 */1 * * * *"
      max-retries: 3

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    microservices.ecommerce.gateway: DEBUG
