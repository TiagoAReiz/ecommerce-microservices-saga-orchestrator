server:
  port: 8080

spring:
  application:
    name: gateway-service

  # R2DBC PostgreSQL for Saga State Persistence
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/gateway_db
    username: postgres
    password: postgres

  cloud:
    gateway:
      routes:
        - id: products-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/products/**

        - id: inventory-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/inventory/**

        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/carts/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**

        - id: delivery-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/deliveries/**

      default-filters:
        - name: Cors
          args:
            allowedOrigins: "*"
            allowedMethods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
            allowedHeaders: "*"

# Microservice base URLs for WebClient orchestration calls
app:
  services:
    products-url: http://localhost:8081
    inventory-url: http://localhost:8082
    cart-url: http://localhost:8083
    order-url: http://localhost:8084
    payment-url: http://localhost:8085
    delivery-url: http://localhost:8086
  webclient:
    connect-timeout-ms: 5000
    read-timeout-ms: 5000
  jwt:
    secret: my-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-hs256
    public-paths:
      - /api/v1/products/**
      - /actuator/**
  saga:
    recovery:
      stuck-threshold-minutes: 5
      cron: "0 */1 * * * *"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    microservices.ecommerce.gateway: DEBUG
